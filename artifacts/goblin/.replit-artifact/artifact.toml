kind = "web"
previewPath = "/"
title = "GPU Goblins - $GOBLIN"
version = "1.0.0"
id = "artifacts/goblin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20093
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/goblin run dev"

[services.env]
PORT = "20093"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/goblin", "run", "build"]
publicDir = "artifacts/goblin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
